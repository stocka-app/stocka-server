services:
  postgres:
    image: postgres:15-alpine
    container_name: stocka-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-stocka_db}
      POSTGRES_USER: ${DB_USERNAME:-stocka}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stocka_dev_password}
    volumes:
      - stocka_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-stocka} -d ${DB_DATABASE:-stocka_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stocka-network

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: stocka-api
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-stocka}
      DB_PASSWORD: ${DB_PASSWORD:-stocka_dev_password}
      DB_DATABASE: ${DB_DATABASE:-stocka_db}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stocka-network

volumes:
  stocka_pgdata:

networks:
  stocka-network:
    driver: bridge
